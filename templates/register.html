{% extends "base.html" %}

{% block title %}Registrieren{% endblock %}

{% block inhalt %}
<div class="form-container">
    <h1>Neues Konto erstellen</h1>
    <p class="untertitel">Registriere dich kostenlos bei BudgetBuddy</p>

    <form method="post" class="form">
        <div class="feld-gruppe">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required
                   placeholder="z.B. maxmustermann">
        </div>

        <div class="feld-gruppe">
            <label for="email">E-Mail</label>
            <input type="email" id="email" name="email" required
                   placeholder="z.B. max@example.com">
        </div>

        <div class="feld-gruppe">
            <label for="passwort">Passwort</label>
            <input type="password" id="passwort" name="passwort" required
                   placeholder="Mindestens 8 Zeichen">
            <small>Mindestens 8 Zeichen erforderlich</small>
        </div>

        <button type="submit" class="btn btn-gruen">Konto erstellen</button>
    </form>

    <p class="hinweis">
        Du hast schon ein Konto? <a href="{{ url_for('login') }}">Hier einloggen</a>
    </p>
</div>
{% endblock %}
