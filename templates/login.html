{% extends "base.html" %}

{% block title %}Einloggen{% endblock %}

{% block inhalt %}
<div class="form-container">
    <h1>Einloggen</h1>
    <p class="untertitel">Melde dich mit deinen Zugangsdaten an</p>

    <form method="post" class="form">
        <div class="feld-gruppe">
            <label for="username">Benutzername</label>
            <input type="text" id="username" name="username" required
                   placeholder="Dein Benutzername">
        </div>

        <div class="feld-gruppe">
            <label for="passwort">Passwort</label>
            <input type="password" id="passwort" name="passwort" required
                   placeholder="Dein Passwort">
        </div>

        <button type="submit" class="btn btn-gruen">Einloggen</button>
    </form>

    <p class="hinweis">
        Noch kein Konto? <a href="{{ url_for('register') }}">Hier registrieren</a>
    </p>
</div>
{% endblock %}
